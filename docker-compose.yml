name: poc-aura

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: poc-aura-sqlserver
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Aura@Poc2024!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Aura@Poc2024!", "-Q", "SELECT 1", "-C"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - poc-network

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: poc-aura-cloudbeaver
    restart: unless-stopped
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver-data:/opt/cloudbeaver/workspace
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - poc-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: poc-aura-backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=PocAuraDb;User Id=sa;Password=Aura@Poc2024!;TrustServerCertificate=True;
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - poc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: poc-aura-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - poc-network

  blazor:
    build:
      context: ./blazor
      dockerfile: Dockerfile
    container_name: poc-aura-blazor
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - Backend__Url=http://backend:8080
    ports:
      - "5001:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - poc-network

volumes:
  sqlserver-data:
  cloudbeaver-data:

networks:
  poc-network:
    driver: bridge
