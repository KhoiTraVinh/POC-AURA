name: poc-aura

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: poc-aura-backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:8080
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - poc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: poc-aura-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - poc-network

networks:
  poc-network:
    driver: bridge
