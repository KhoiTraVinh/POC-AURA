name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── .NET: builds both POC.AURA.Api and POC.AURA.SmartHub via POC.sln ──────
  build-dotnet:
    name: Build .NET (API + SmartHub)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore POC.sln

    - name: Build
      run: dotnet build POC.sln --no-restore --configuration Release

  # ── Angular ───────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Build (production)
      run: npm run build:prod

  # ── Docker: all three images (dry-run, no push) ───────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-dotnet, build-frontend]
    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - name: Build API image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        tags: poc-aura/api:latest

    - name: Build SmartHub image
      uses: docker/build-push-action@v5
      with:
        context: ./blazor
        file: ./blazor/Dockerfile
        push: false
        tags: poc-aura/smarthub:latest

    - name: Build Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: false
        tags: poc-aura/frontend:latest
