name: poc-aura-dev

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: poc-aura-backend-dev
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - DOTNET_USE_POLLING_FILE_WATCHER=true
    ports:
      - "5000:8080"
    volumes:
      - ./backend:/app
    # Required for vsdbg attach debugging
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    networks:
      - poc-dev-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: poc-aura-frontend-dev
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - poc-dev-network

networks:
  poc-dev-network:
    driver: bridge
