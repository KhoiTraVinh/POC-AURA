name: poc-aura-dev

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: poc-aura-sqlserver-dev
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Aura@Poc2024!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-dev-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Aura@Poc2024!", "-Q", "SELECT 1", "-C"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - poc-dev-network

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: poc-aura-cloudbeaver-dev
    restart: unless-stopped
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver-dev-data:/opt/cloudbeaver/workspace
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - poc-dev-network

  # VS Code Dev Containers connects here — co ca .NET 8 + Node 22
  workspace:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    container_name: poc-aura-workspace
    volumes:
      - .:/workspace:cached
      - workspace-node-modules:/workspace/frontend/node_modules
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:5000
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=PocAuraDb;User Id=sa;Password=Aura@Poc2024!;TrustServerCertificate=True;
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5000:5000"
      - "4200:4200"
    depends_on:
      sqlserver:
        condition: service_healthy
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    networks:
      - poc-dev-network

  # Standalone runners - dung khi KHONG dung devcontainer
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: poc-aura-backend-dev
    restart: unless-stopped
    profiles: ["standalone"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=PocAuraDb;User Id=sa;Password=Aura@Poc2024!;TrustServerCertificate=True;
    ports:
      - "5000:8080"
    volumes:
      - ./backend:/app
    depends_on:
      sqlserver:
        condition: service_healthy
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    networks:
      - poc-dev-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: poc-aura-frontend-dev
    restart: unless-stopped
    profiles: ["standalone"]
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - poc-dev-network

volumes:
  sqlserver-dev-data:
  cloudbeaver-dev-data:
  workspace-node-modules:

networks:
  poc-dev-network:
    driver: bridge
