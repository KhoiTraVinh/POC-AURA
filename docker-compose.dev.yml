name: poc-aura-dev

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: poc-aura-dev-sqlserver
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Aura@Poc2024!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-dev-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Aura@Poc2024!", "-Q", "SELECT 1", "-C"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - poc-dev-network

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: poc-aura-dev-cloudbeaver
    restart: unless-stopped
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver-dev-data:/opt/cloudbeaver/workspace
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - poc-dev-network

  workspace:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    container_name: poc-aura-dev-workspace
    volumes:
      - .:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER=1
    ports:
      - "4300:4300"   # Angular — accessible on LAN via 192.168.50.113:4300
      - "5000:5000"   # Backend API
      - "5001:5001"   # Blazor SmartHub
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - poc-dev-network
    depends_on:
      sqlserver:
        condition: service_healthy
    command: sleep infinity

  jmeter:
    image: justb4/jmeter:5.6.3
    container_name: poc-aura-dev-jmeter
    volumes:
      - ./tests/jmeter:/tests
    environment:
      - BASE_HOST=workspace
      - BASE_PORT=5000
    networks:
      - poc-dev-network
    profiles:
      - testing
    entrypoint: ["sleep", "infinity"]

volumes:
  sqlserver-dev-data:
  cloudbeaver-dev-data:

networks:
  poc-dev-network:
    driver: bridge
